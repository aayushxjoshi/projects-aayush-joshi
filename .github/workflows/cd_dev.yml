name: Deploy to Dev Environment

on:
  push:
    branches:
      - "main"

jobs:
  redeploy_service:
    name: Redeploy projects-aayush dev Environment
    runs-on: ubuntu-latest

    steps:
      - name: Debug SSH secret
        run: |
          SECRET="${{ secrets.SSH_PRIVATE_KEY }}"

          if [ -z "$SECRET" ]; then
            echo "❌ SECRET IS EMPTY"
            exit 1
          else
            echo "✅ SECRET IS PRESENT"
          fi

          echo "Length of secret: ${#SECRET}"
          ssh -o StrictHostKeyChecking=no -i ~/ssh_key ubuntu@100.52.152.26 << 'EOF'
          cd projects-aayush-joshi/
          git pull
          npm install
          npm run build
          pm2 restart projects-aayush-repo
          EOF
