name: Deploy to Dev Environment

on:
  push:
    branches:
      - "main"

jobs:
  redeploy_service:
    name: Redeploy projects-aayush dev Environment
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/ssh_key
          chmod 600 ~/ssh_key

          ssh -o StrictHostKeyChecking=no -i ~/ssh_key ubuntu@100.52.152.26 << 'EOF'

          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

          node -v
          npm -v
          pm2 -v

          cd projects-aayush-joshi/
          git pull
          npm install
          npm run build
          pm2 restart projects-aayush-repo

          EOF
