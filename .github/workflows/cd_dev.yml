name: Deploy to Dev Environment

on:
  push:
    branches:
      - "main"

jobs:
  redeploy_service:
    name: Redeploy projects-aayush dev Environment
    runs-on: ubuntu-latest

    steps:
      - name: SSH Into Server
      - run: |
          echo ${{secrets.SSH_PRIVATE_KEY}} &> ~/ssh_key
          ssh -i ~/ssh_key ubuntu@100.52.152.26
          cd projects-aayush-joshi/ && git pull
          npm install
          npm run build
          pm2 restart projects-aayush-repo
